<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceMouse Dashboard</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #0f3460;
    --highlight: #e94560;
    --text: #eee;
    --muted: #888;
    --green: #4ecca3;
    --blue: #00b4d8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--panel);
    border-bottom: 2px solid var(--accent);
  }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  #status {
    font-size: 0.85rem;
    padding: 4px 14px;
    border-radius: 12px;
    background: var(--highlight);
  }
  #status.connected { background: var(--green); color: #111; }
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    min-height: 0;
  }
  .panel {
    background: var(--panel);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel h2 {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  #three-container { flex: 1; width: 100%; min-height: 0; position: relative; border-radius: 6px; overflow: hidden; }
  #topic-info {
    position: absolute; bottom: 8px; left: 8px;
    font-size: 0.7rem; font-family: monospace;
    color: rgba(255,255,255,0.6);
    pointer-events: none; line-height: 1.5;
  }
  #topic-info span { color: var(--green); }
  .axis-group { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .axis-row { display: flex; align-items: center; gap: 8px; }
  .axis-label { width: 28px; font-size: 0.8rem; font-weight: 600; text-align: right; flex-shrink: 0; }
  .axis-bar-track {
    flex: 1; height: 18px; background: var(--accent);
    border-radius: 4px; position: relative; overflow: hidden;
  }
  .axis-bar-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--muted); }
  .axis-bar-fill { position: absolute; top: 2px; bottom: 2px; border-radius: 3px; transition: left 0.05s, width 0.05s; }
  .axis-value { width: 52px; font-size: 0.75rem; font-family: monospace; text-align: left; flex-shrink: 0; }
  /* SpaceMouse Pro button pad — radial layout matching the physical device */
  .smp-device { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; min-height: 0; }
  .smp-fnrow { display: flex; gap: 54px; justify-content: center; }
  .smp-fnpair { display: flex; gap: 6px; }
  .smp-body { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .smp-mods { display: grid; grid-template-columns: auto auto; gap: 5px; justify-items: center; align-items: center; }
  .smp-mods .span2 { grid-column: 1 / 3; }
  .smp-quickwrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .smp-quick { display: grid; grid-template-columns: repeat(3, auto); grid-template-rows: repeat(3, auto); gap: 4px; align-items: center; justify-items: center; }
  .smp-cap {
    width: 58px; height: 58px; border-radius: 50%; flex-shrink: 0;
    border: 3px solid var(--blue);
    background: radial-gradient(circle at 50% 38%, #16324e, #070d16);
    display: flex; align-items: center; justify-content: center;
  }
  .smp-cap::after { content: ''; width: 24px; height: 24px; border-radius: 50%; background: #0a121f; box-shadow: inset 0 2px 5px rgba(0,0,0,0.7); }
  .smp-key {
    position: relative; min-width: 38px; height: 30px; padding: 0 7px;
    border-radius: 7px; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.74rem; font-weight: 600; white-space: nowrap;
    transition: background 0.1s, box-shadow 0.1s;
  }
  .smp-key.rot { width: 34px; min-width: 34px; height: 34px; border-radius: 50%; padding: 0; font-size: 0.95rem; }
  .smp-key.pressed { background: var(--highlight); box-shadow: 0 0 14px rgba(233,69,96,0.5); }
  .smp-key-idx { position: absolute; top: 0; right: 3px; font-size: 0.48rem; color: var(--muted); font-weight: 400; }
  .smp-key.pressed .smp-key-idx { color: rgba(255,255,255,0.85); }
  .smp-cap-note { text-align: center; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.3px; margin-top: 2px; }
  .smp-warn { text-align: center; font-size: 0.6rem; color: #e3b341; line-height: 1.3; margin-top: 3px; max-width: 94%; align-self: center; }
  .joy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; flex: 1; align-content: center; }
  .joy-cell { background: var(--accent); border-radius: 8px; padding: 10px 8px; text-align: center; }
  .joy-cell .label { font-size: 0.7rem; color: var(--muted); }
  .joy-cell .value { font-size: 1.1rem; font-family: monospace; margin-top: 2px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js",
    "three/addons/": "./vendor/addons/"
  }
}
</script>
</head>
<body>
<header>
  <h1>&#x1F5B1; SpaceMouse Dashboard</h1>
  <span id="status">Disconnected</span>
</header>
<div class="main">
  <div class="panel">
    <h2>3D Preview</h2>
    <div id="three-container">
      <div id="topic-info"></div>
    </div>
  </div>
  <div class="panel">
    <h2>Axes</h2>
    <div class="axis-group" id="axisGroup"></div>
  </div>
  <div class="panel">
    <h2>Buttons &mdash; SpaceMouse Pro</h2>
    <div class="smp-device" id="btnPad">
      <div class="smp-fnrow">
        <div class="smp-fnpair" id="smp-fn-l"></div>
        <div class="smp-fnpair" id="smp-fn-r"></div>
      </div>
      <div class="smp-body">
        <div class="smp-mods" id="smp-mods"></div>
        <div class="smp-cap"></div>
        <div class="smp-quickwrap">
          <div class="smp-quick" id="smp-quick"></div>
          <div id="smp-fit"></div>
        </div>
      </div>
      <div class="smp-cap-note">label &middot; small number = <code>spacenav/joy</code> buttons[i]</div>
      <div class="smp-warn">&#9888; Avoid pressing 3+ buttons at once &mdash; the device may report a phantom button (matrix ghosting).</div>
    </div>
  </div>
  <div class="panel">
    <h2>Joy Raw Values</h2>
    <div class="joy-grid" id="joyGrid"></div>
  </div>
</div>

<script>
// ─── Data polling (same port, /data endpoint) ─────────────────
const statusEl = document.getElementById('status');
window.latestData = null;
let connected = false;

async function pollData() {
  try {
    const resp = await fetch('/data');
    if (resp.ok) {
      window.latestData = await resp.json();
      if (!connected) {
        connected = true;
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
      }
    }
  } catch (e) {
    if (connected) {
      connected = false;
      statusEl.textContent = 'Disconnected';
      statusEl.className = '';
    }
  }
}
setInterval(pollData, 33);
pollData();

// ─── Axis bars setup ──────────────────────────────────────────
const axisLabels = [
  { key: 'lx', label: 'Lin X', color: 'var(--highlight)' },
  { key: 'ly', label: 'Lin Y', color: 'var(--green)' },
  { key: 'lz', label: 'Lin Z', color: 'var(--blue)' },
  { key: 'ax', label: 'Ang X', color: 'var(--highlight)' },
  { key: 'ay', label: 'Ang Y', color: 'var(--green)' },
  { key: 'az', label: 'Ang Z', color: 'var(--blue)' },
];
const axisGroup = document.getElementById('axisGroup');
const axisEls = {};
axisLabels.forEach(a => {
  const row = document.createElement('div');
  row.className = 'axis-row';
  row.innerHTML = `
    <span class="axis-label">${a.label}</span>
    <div class="axis-bar-track">
      <div class="axis-bar-center"></div>
      <div class="axis-bar-fill" style="background:${a.color};" id="bar_${a.key}"></div>
    </div>
    <span class="axis-value" id="val_${a.key}">0.000</span>`;
  axisGroup.appendChild(row);
  axisEls[a.key] = { bar: row.querySelector(`#bar_${a.key}`), val: row.querySelector(`#val_${a.key}`) };
});
function updateAxes(twist) {
  for (const a of axisLabels) {
    const v = twist[a.key] || 0;
    const pct = Math.min(Math.abs(v), 1) * 50;
    const bar = axisEls[a.key].bar;
    if (v >= 0) { bar.style.left = '50%'; bar.style.width = pct + '%'; }
    else { bar.style.left = (50 - pct) + '%'; bar.style.width = pct + '%'; }
    axisEls[a.key].val.textContent = v.toFixed(3);
  }
}

// ─── Buttons (SpaceMouse Pro: 15 buttons, fixed index→name map) ──
// Index = position in sensor_msgs/Joy .buttons[]. Matches spacenavd's
// SpaceMouse Pro mapping (bnhack_smpro). 1 = pressed, 0 = released.
// Keys are arranged radially to match the physical device: function keys
// arc over the top, keyboard modifiers + Menu on the left, QuickView keys
// (2x2 with the rotation toggle in the center) + Fit on the right.
const SMP_BUTTONS = [
  { i: 0,  label: '1',     name: 'Function 1' },
  { i: 1,  label: '2',     name: 'Function 2' },
  { i: 2,  label: '3',     name: 'Function 3' },
  { i: 3,  label: '4',     name: 'Function 4' },
  { i: 4,  label: 'Menu',  name: 'Menu' },
  { i: 5,  label: 'Fit',   name: 'Fit' },
  { i: 6,  label: 'T',     name: 'Top view' },
  { i: 7,  label: 'R',     name: 'Right view' },
  { i: 8,  label: 'F',     name: 'Front view' },
  { i: 9,  label: 'Roll',  name: 'Roll view' },
  { i: 10, label: '\u27F3', name: 'Rotation toggle' },
  { i: 11, label: 'Esc',   name: 'Esc' },
  { i: 12, label: 'Alt',   name: 'Alt' },
  { i: 13, label: 'Shift', name: 'Shift' },
  { i: 14, label: 'Ctrl',  name: 'Ctrl' },
];
const smpKeyEls = {};
function smpKey(i, extra) {
  const b = SMP_BUTTONS[i];
  const el = document.createElement('div');
  el.className = 'smp-key' + (extra ? ' ' + extra : '');
  el.title = b.name + ' — buttons[' + i + ']';
  el.innerHTML = `<span class="smp-key-label">${b.label}</span>` +
                 `<span class="smp-key-idx">${i}</span>`;
  smpKeyEls[i] = el;
  return el;
}
(function buildButtonPad() {
  // Function keys: 1,2 over the top-left, 3,4 over the top-right.
  document.getElementById('smp-fn-l').append(smpKey(0), smpKey(1));
  document.getElementById('smp-fn-r').append(smpKey(2), smpKey(3));
  // Left of the cap: keyboard modifiers + Menu (Esc / Shift Ctrl / Alt / Menu).
  document.getElementById('smp-mods').append(
    smpKey(11, 'span2'), smpKey(13), smpKey(14),
    smpKey(12, 'span2'), smpKey(4, 'span2'));
  // Right of the cap: QuickView 2x2 with the rotation toggle in the center.
  const q = document.getElementById('smp-quick');
  const place = (el, r, c) => { el.style.gridRow = r; el.style.gridColumn = c; q.append(el); };
  place(smpKey(9), 1, 1);          // Roll (top-left)
  place(smpKey(6), 1, 3);          // T  (top-right)
  place(smpKey(10, 'rot'), 2, 2);  // rotation toggle (center)
  place(smpKey(8), 3, 1);          // F  (bottom-left)
  place(smpKey(7), 3, 3);          // R  (bottom-right)
  // Fit below the QuickView cluster.
  document.getElementById('smp-fit').append(smpKey(5));
})();
function updateButtons(buttons) {
  for (const i in smpKeyEls)
    smpKeyEls[i].classList.toggle('pressed', buttons[Number(i)] === 1);
}

// ─── Joy grid ─────────────────────────────────────────────────
const joyLabels = ['vX', 'vY', 'vZ', 'wX', 'wY', 'wZ'];
const joyGrid = document.getElementById('joyGrid');
const joyCells = [];
joyLabels.forEach((l, i) => {
  const cell = document.createElement('div');
  cell.className = 'joy-cell';
  cell.innerHTML = `<div class="label">${l}</div><div class="value" id="joy_${i}">0.000</div>`;
  joyGrid.appendChild(cell);
  joyCells.push(cell.querySelector(`#joy_${i}`));
});
function updateJoy(axes) {
  for (let i = 0; i < Math.min(axes.length, joyCells.length); i++)
    joyCells[i].textContent = axes[i].toFixed(3);
}
</script>

<script type="module">
// ─── Three.js 3D Preview (self-contained, no CDN) ────────────
import * as THREE from 'three';
import { TrackballControls } from 'three/addons/controls/TrackballControls.js';

const container = document.getElementById('three-container');

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x16213e);

// Camera — Z-up, looking at +X, tilted down ~30°
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.up.set(0, 0, 1); // Z is up
// Position behind –X, slightly +Y (left), elevated in Z for 30° downward tilt
const camDist = 7;
const tiltAngle = 30 * Math.PI / 180;
camera.position.set(-camDist * Math.cos(tiltAngle), 1.5, camDist * Math.sin(tiltAngle));
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// TrackballControls (arcball-style rotation)
const controls = new TrackballControls(camera, renderer.domElement);
controls.rotateSpeed = 3.0;
controls.zoomSpeed = 1.2;
controls.panSpeed = 0.8;
controls.dynamicDampingFactor = 0.15;
controls.target.set(0, 0, 0);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
scene.add(new THREE.HemisphereLight(0xb0d4f1, 0x404040, 0.5));
const d1 = new THREE.DirectionalLight(0xffffff, 0.9);
d1.position.set(5, 3, 8); d1.castShadow = true;
d1.shadow.mapSize.set(1024, 1024); scene.add(d1);
const d2 = new THREE.DirectionalLight(0xffffff, 0.4);
d2.position.set(-3, -4, -1); scene.add(d2);

// Grid on XY plane (Z-up)
const grid = new THREE.GridHelper(10, 10, 0x444466, 0x333355);
grid.rotation.x = Math.PI / 2; // rotate from Y-up to Z-up
grid.position.z = -1.8;
scene.add(grid);

// Ground shadow plane on XY (Z-up)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  new THREE.ShadowMaterial({ opacity: 0.25 })
);
ground.position.z = -1.8;
ground.receiveShadow = true;
scene.add(ground);

// Cube group
const cubeGroup = new THREE.Group();
scene.add(cubeGroup);

// Cube
const geo = new THREE.BoxGeometry(1.6, 1.6, 1.6);
const materials = [
  new THREE.MeshPhysicalMaterial({ color: 0xe94560, metalness: 0.2, roughness: 0.4 }),
  new THREE.MeshPhysicalMaterial({ color: 0xc73a52, metalness: 0.2, roughness: 0.4 }),
  new THREE.MeshPhysicalMaterial({ color: 0x4ecca3, metalness: 0.2, roughness: 0.4 }),
  new THREE.MeshPhysicalMaterial({ color: 0x3db88e, metalness: 0.2, roughness: 0.4 }),
  new THREE.MeshPhysicalMaterial({ color: 0x00b4d8, metalness: 0.2, roughness: 0.4 }),
  new THREE.MeshPhysicalMaterial({ color: 0x0096b5, metalness: 0.2, roughness: 0.4 }),
];
const cube = new THREE.Mesh(geo, materials);
cube.castShadow = true;
cube.receiveShadow = true;

// Wireframe edges
const edges = new THREE.LineSegments(
  new THREE.EdgesGeometry(geo),
  new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 })
);
cube.add(edges);
cubeGroup.add(cube);

// Axes arrows on the cube
const axLen = 1.6;
const axColors = [0xe94560, 0x4ecca3, 0x00b4d8];
[new THREE.Vector3(1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1)].forEach((dir, i) => {
  const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(0,0,0), axLen, axColors[i], 0.22, 0.13);
  cubeGroup.add(arrow);
});

// Scene axes helper (small, at origin)
scene.add(new THREE.AxesHelper(0.5));

// Resize
function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  if (w <= 0 || h <= 0) return;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  controls.handleResize();
}
window.addEventListener('resize', resize);
resize();

// State
const cubeQuat = new THREE.Quaternion(); // accumulated rotation
let tPosX = 0, tPosY = 0, tPosZ = 0;
const DECAY = 0.92, ROT_SPEED = 2.5, POS_SPEED = 2.0;

// Render + animation loop
(function animate() {
  requestAnimationFrame(animate);

  // Read latestData from the global scope (set by polling script)
  const d = window.latestData;
  const twist = d ? d.twist : { lx:0, ly:0, lz:0, ax:0, ay:0, az:0 };
  const dt = 1 / 30;

  // Build incremental rotation quaternion from current angular input
  const dax = (twist.ax || 0) * ROT_SPEED * dt;
  const day = (twist.ay || 0) * ROT_SPEED * dt;
  const daz = (twist.az || 0) * ROT_SPEED * dt;
  const deltaQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(dax, day, daz, 'XYZ'));
  // Apply incremental rotation to accumulated rotation
  cubeQuat.multiplyQuaternions(deltaQuat, cubeQuat);
  cubeQuat.normalize();

  tPosX += (twist.lx || 0) * POS_SPEED * dt;
  tPosY += (twist.ly || 0) * POS_SPEED * dt;
  tPosZ += (twist.lz || 0) * POS_SPEED * dt;
  tPosX *= DECAY; tPosY *= DECAY; tPosZ *= DECAY;

  cube.quaternion.copy(cubeQuat);
  cubeGroup.position.set(tPosX, tPosY, tPosZ);

  // Update 2D UI
  if (d) {
    updateAxes(d.twist);
    updateButtons(d.joy.buttons || []);
    updateJoy(d.joy.axes || []);

    // Update topic info overlay
    if (d.hz) {
      const info = document.getElementById('topic-info');
      info.innerHTML = Object.entries(d.hz)
        .map(([t, hz]) => `${t} <span>${hz} Hz</span>`)
        .join('<br>');
    }
  }

  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
